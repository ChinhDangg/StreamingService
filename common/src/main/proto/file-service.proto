syntax = "proto3";

option java_package = "dev.chinh.streamingservice.common.proto";
option java_multiple_files = true;

message FileItem {
  string id = 1;
  string parentId = 2;
  string path = 3;
  string name = 4;
  string bucket = 5;
  string objectName = 6;
  int64 size = 7;
  int32 length = 8;
}

message FileRequest {
  string id = 1;
  int32 page = 2;
  string sortBy = 3;
  string sortOrder = 4;
}

message FileResponse {
  repeated FileItem content = 1;
  bool has_next = 2;
}

service FileService {
  rpc FindFilesInDirectory (FileRequest) returns (FileResponse);
  rpc FindFileByMId (FileRequest) returns (FileResponse);
}