server {
    listen 443 ssl;
    server_name _;

    # Point to the certs we mounted in Docker Compose
    ssl_certificate /etc/nginx/certs/server.crt;
    ssl_certificate_key /etc/nginx/certs/server.key;

    # Basic SSL configuration for security
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 0;

    # 1. Apply our reusable proxy headers to the entire server
    include /usr/local/openresty/nginx/conf/proxy.conf;

    # 2. Define Variables for dynamic DNS resolution (Prevents Startup Crashes!)
    set $backend        http://backend:8080;
    set $upload_service http://media-upload:8083;
    set $auth_service   http://auth-service:8084;
    set $file_manager   http://file-manager:8085;
    set $frontend       http://frontend:8081;
    set $minio_server   http://minio:9000;


    location ~ ^/stream/upload/(.*)$ {
        # MinIO is sensitive to the Host header for signatures
        # Trick MinIO into thinking the request hit localhost:9000
        # exactly as the Spring Boot S3Presigner intended.
        proxy_set_header Host localhost:9000;

        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable limits for large video uploads
        client_max_body_size 0;
        proxy_buffering off;
        proxy_request_buffering off;

        proxy_pass http://minio:9000/$1$is_args$args;
    }

    # =====================================
    # 1. MinIO Direct Streams
    # =====================================
    location /stream/redirect/object/ {
        internal;
        add_header X-Media-State "COMPLETED" always;

        proxy_set_header Host $http_host;             # Use the client's requested Host
        proxy_set_header X-Forwarded-Proto $scheme;   # Tell MinIO if it's HTTP or HTTPS

        # These explicitly override the proxy.conf defaults for MinIO
        proxy_set_header Connection "";
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;

        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;

        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 15s;

        proxy_pass http://minio/;
    }

    location ~ ^/stream/object/([^/]+)/(.*)$ {
        set $jwt_user_id "";
        access_by_lua_file "/usr/local/openresty/nginx/lua/auth.lua";

        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_request_buffering off;

        proxy_pass $minio_server/$1/$jwt_user_id/$2;
    }

    # =====================================
    # 2. RAM Transcoded Streams (Lua + Alias)
    # =====================================
    location ~ ^/stream/chunks/([^/]+)/([^/]+)/(.*)$ {
        set $jwt_user_id "";
        access_by_lua_file "/usr/local/openresty/nginx/lua/auth.lua";
        rewrite_by_lua_block {
            local http = require("resty.http")
            local videoId = ngx.var[1]
            local resolution = ngx.var[2]

            ngx.timer.at(0, function()
                local client = http.new()
                local url = string.format("http://backend:8080/internal/access/video/%s/%s", videoId, resolution)
                local res, err = client:request_uri(url, {
                    method = "POST",
                    keepalive_timeout = 5,
                    keepalive_pool = 10,
                })
                if not res then ngx.log(ngx.ERR, "Failed to notify access: ", err) end
            end)
        }

        limit_req zone=stream_zone burst=500 nodelay;

        alias /chunks/$jwt_user_id/$1/$2/$3;
        add_header X-Origin "RAM (ffmpeg)" always;
        add_header X-Debug-Path $request_filename always;
    }

    location ~ ^/stream/album-vid/([^/]+)/([^/]+)/([^/]+)/([^/]+)/(.*)$ {
        set $jwt_user_id "";
        access_by_lua_file "/usr/local/openresty/nginx/lua/auth.lua";
        rewrite_by_lua_block {
            local http = require("resty.http")
            local albumId, albumRes, vidObj, vidRes = ngx.var[1], ngx.var[2], ngx.var[3], ngx.var[4]

            ngx.timer.at(0, function()
                local client = http.new()
                local url = string.format("http://backend:8080/internal/access/album-vid/%s/%s/%s/%s", albumId, albumRes, vidObj, vidRes)
                local res, err = client:request_uri(url, {
                    method = "POST",
                    keepalive_timeout = 5,
                    keepalive_pool = 10
                })
                if not res then
                    ngx.log(ngx.ERR, "Failed to notify access: ", err)
                end
            end)
        }
        limit_req zone=stream_zone burst=500 nodelay;

        alias /chunks/$jwt_user_id/$1/$3/$4/$5;
        add_header X-Origin "RAM (ffmpeg)" always;
        add_header X-Debug-Path $request_filename always;
    }

    location ~ ^/stream/album/([^/]+)/([^/]+)/(.*)$ {
        set $jwt_user_id "";
        access_by_lua_file "/usr/local/openresty/nginx/lua/auth.lua";
        rewrite_by_lua_block {
            local http = require("resty.http")
            local albumId, albumRes = ngx.var[1], ngx.var[2]

            ngx.timer.at(0, function()
                local client = http.new()
                local url = string.format("http://backend:8080/internal/access/album/%s/%s", albumId, albumRes)
                local res, err = client:request_uri(url, {
                    method = "POST",
                    keepalive_timeout = 5,
                    keepalive_pool = 10
                })
                if not res then
                    ngx.log(ngx.ERR, "Failed to notify access: ", err)
                end
            end)
        }

        limit_req zone=stream_zone burst=300 nodelay;

        alias /chunks/$jwt_user_id/$1/$2/$3;
        add_header X-Origin "RAM (ffmpeg)" always;
        add_header X-Debug-Path $request_filename always;
    }

    # =====================================
    # 3. Static & Cache
    # =====================================
    location ~ ^/thumbnail-cache/(.*)$ {
        set $jwt_user_id "";
        access_by_lua_file "/usr/local/openresty/nginx/lua/auth.lua";
        limit_req zone=stream_zone burst=500 nodelay;

        alias /chunks/thumbnail-cache/$jwt_user_id/$1;
        add_header X-Origin "Thumbnail-Cache" always;
        autoindex off;
    }

    location /stream/ {
        return 404;
    }

    # =====================================
    # 4. Spring Boot Microservices
    # =====================================
    location /api/upload/ {
        #limit_req zone=upload_zone burst=10 nodelay;
        proxy_pass $upload_service;
    }

    location /api/modify/ {
        limit_req zone=upload_zone burst=10 nodelay;
        proxy_pass $upload_service;
    }

    location /api/file/ {
        # limit_req zone=file_zone burst=20 nodelay;
        proxy_pass $file_manager;
    }

    location /api/ {
        limit_req zone=api_zone burst=60 nodelay;
        proxy_pass $backend;
    }

    location /auth/ {
        limit_req zone=login_zone burst=10 nodelay;
        proxy_pass $auth_service;
    }

    # =====================================
    # 5. Frontend UI
    # =====================================
    location /page/ {
        limit_req zone=static_zone burst=20 nodelay;

        # For Spring Boot to know the real public URL
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass $frontend;
    }

    location /static/ {
        limit_req zone=static_zone burst=30 nodelay;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass $frontend;
    }

    location / {
        limit_req zone=api_zone burst=60 nodelay;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_pass $frontend;
    }
}



