services:
  auth-service:
    build:
      context: ../auth-service
      dockerfile: Dockerfile
      args:
        SERVICE_PORT: ${AUTH_PORT}
    ports:
      - "${AUTH_PORT}:${AUTH_PORT}"
    environment:
      - AUTH_PORT=${AUTH_PORT}

      - TEST_USER_USERNAME=${TEST_USER_USERNAME}
      - TEST_USER_PASSWORD=${TEST_USER_PASSWORD}
      - TEST_USER_ROLES=${TEST_USER_ROLES}
      - TEST_USER_NAME=${TEST_USER_NAME}

      - DB_AUTH_SERVICE_PASSWORD=${DB_AUTH_SERVICE_PASSWORD}
      - DB_URL=${DB_URL}
      - DB_POOL_SIZE=${DB_POOL_SIZE}
      - DB_MIN_IDLE=${DB_MIN_IDLE}
      - DB_POOL_NAME=${DB_POOL_NAME}
      - JPA_SHOW_SQL=${JPA_SHOW_SQL}

      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      args:
        SERVICE_PORT: ${BACKEND_PORT}
    ports:
      - "${BACKEND_PORT}:${BACKEND_PORT}"
    environment:
      - BACKEND_PORT=${BACKEND_PORT}

      - AUTH_SERVER=${AUTH_SERVER}

      - OPENSEARCH_HOST=${OPENSEARCH_HOST}
      - OPENSEARCH_PORT=${OPENSEARCH_PORT}

      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}

      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_URL=${DB_URL}
      - DB_POOL_SIZE=${DB_POOL_SIZE}
      - DB_MIN_IDLE=${DB_MIN_IDLE}
      - DB_POOL_NAME=${DB_POOL_NAME}
      - JPA_SHOW_SQL=${JPA_SHOW_SQL}

      - MINIO_CONTAINER_URL=${MINIO_CONTAINER_URL}
      - MINIO_URL=${MINIO_URL} # Used for browser-side redirects if needed
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}

      # Features
      - ALWAYS_SHOW_ORIGINAL_RESOLUTION=${ALWAYS_SHOW_ORIGINAL_RESOLUTION}
      - OS_NAME=${OS_NAME}
      - RAM_DISK_NAME=${RAM_DISK_NAME}
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started
    volumes:
      - ${RAM_VOLUME}:/chunks

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        SERVICE_PORT: ${FRONTEND_PORT}
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    environment:
      - FRONTEND_PORT=${FRONTEND_PORT}
      - AUTH_SERVER=${AUTH_SERVER}

  file-manager:
    build:
      context: ../file-manager
      dockerfile: Dockerfile
      args:
        SERVICE_PORT: ${FILE_MANAGER_PORT}
    ports:
      - "${FILE_MANAGER_PORT}:${FILE_MANAGER_PORT}"
    environment:
      - FILE_MANAGER_PORT=${FILE_MANAGER_PORT}

      - AUTH_SERVER=${AUTH_SERVER}

      - MINIO_CONTAINER_URL=${MINIO_CONTAINER_URL}
      - MINIO_URL=${MINIO_URL}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}

      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}

      - MONGODB_HOST=${MONGODB_HOST}
      - MONGODB_PORT=${MONGODB_PORT}
      - MONGODB_DATABASE=${MONGODB_DATABASE}
      - MONGODB_USERNAME=${MONGODB_USERNAME}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
      - MONGODB_AUTH_SOURCE=${MONGODB_AUTH_SOURCE}
      - MONGODB_AUTO_INDEX=${MONGODB_AUTO_INDEX}

      - KAFKA_BOOTSTRAP_SERVER=${KAFKA_BOOTSTRAP_SERVER}

      - OS_NAME=${OS_NAME}
      - RAM_DISK_NAME=${RAM_DISK_NAME}
    depends_on:
      mongodb:
        condition: service_healthy
      redpanda:
        condition: service_started
      minio:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ${RAM_VOLUME}:/chunks

  media-object:
    build:
      context: ../media-object
      dockerfile: Dockerfile
    environment:
      - MINIO_CONTAINER_URL=${MINIO_CONTAINER_URL}
      - MINIO_URL=${MINIO_URL}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}

      - DB_MEDIA_UPLOAD_PASSWORD=${DB_MEDIA_UPLOAD_PASSWORD}
      - DB_URL=${DB_URL}
      - DB_POOL_SIZE=${DB_POOL_SIZE}
      - DB_MIN_IDLE=${DB_MIN_IDLE}
      - DB_POOL_NAME=${DB_POOL_NAME}
      - JPA_SHOW_SQL=${JPA_SHOW_SQL}

      - KAFKA_BOOTSTRAP_SERVER=${KAFKA_BOOTSTRAP_SERVER}

      - OS_NAME=${OS_NAME}
      - RAM_DISK_NAME=${RAM_DISK_NAME}
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
      minio:
        condition: service_started
      ffmpeg:
        condition: service_started
    volumes:
      - ${RAM_VOLUME}:/chunks

  media-upload:
    build:
      context: ../media-upload
      dockerfile: Dockerfile
      args:
        SERVICE_PORT: ${MEDIA_UPLOAD_PORT}
    ports:
      - "${MEDIA_UPLOAD_PORT}:${MEDIA_UPLOAD_PORT}"
    environment:
      - MEDIA_UPLOAD_PORT=${MEDIA_UPLOAD_PORT}

      - AUTH_SERVER=${AUTH_SERVER}

      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}

      - MINIO_CONTAINER_URL=${MINIO_CONTAINER_URL}
      - MINIO_EXTERNAL_URL=${MINIO_EXTERNAL_URL}
      - MINIO_URL=${MINIO_URL}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}

      - DB_MEDIA_UPLOAD_PASSWORD=${DB_MEDIA_UPLOAD_PASSWORD}
      - DB_URL=${DB_URL}
      - DB_POOL_SIZE=${DB_POOL_SIZE}
      - DB_MIN_IDLE=${DB_MIN_IDLE}
      - DB_POOL_NAME=${DB_POOL_NAME}
      - JPA_SHOW_SQL=${JPA_SHOW_SQL}

      - KAFKA_BOOTSTRAP_SERVER=${KAFKA_BOOTSTRAP_SERVER}
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started
      redis:
        condition: service_started
      minio:
        condition: service_started

  search-indexer:
    build:
      context: ../search-indexer
      dockerfile: Dockerfile
    environment:
      - OPENSEARCH_HOST=${OPENSEARCH_HOST}
      - OPENSEARCH_PORT=${OPENSEARCH_PORT}

      - DB_SEARCH_INDEXER_PASSWORD=${DB_SEARCH_INDEXER_PASSWORD}
      - DB_URL=${DB_URL}
      - DB_POOL_SIZE=${DB_POOL_SIZE}
      - DB_MIN_IDLE=${DB_MIN_IDLE}
      - DB_POOL_NAME=${DB_POOL_NAME}
      - JPA_SHOW_SQL=${JPA_SHOW_SQL}

      - KAFKA_BOOTSTRAP_SERVER=${KAFKA_BOOTSTRAP_SERVER}
    depends_on:
      opensearch:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_started

  workers:
    build:
      context: ../workers
      dockerfile: Dockerfile
      args:
        SERVICE_PORT: ${WORKERS_PORT}
    ports:
      - "${WORKERS_PORT}:${WORKERS_PORT}"
    environment:
      - WORKERS_PORT=${WORKERS_PORT}

      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_PASSWORD=${REDIS_PASSWORD}

      - MINIO_CONTAINER_URL=${MINIO_CONTAINER_URL}
      - MINIO_URL=${MINIO_URL}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}

      - GRPC_FILE_PROVIDER_ADDRESS=static://file-manager:9090
      - OS_NAME=${OS_NAME}
      - RAM_DISK_NAME=${RAM_DISK_NAME}
    depends_on:
      redpanda:
        condition: service_started
      minio:
        condition: service_started
      redis:
        condition: service_started
      file-manager:
        condition: service_started
    volumes:
      - ${RAM_VOLUME}:/chunks

  media-backup:
    build:
      context: ../media-backup
      dockerfile: Dockerfile
    environment:
      - MINIO_CONTAINER_URL=${MINIO_CONTAINER_URL}
      - MINIO_URL=${MINIO_URL}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY}

      - KAFKA_BOOTSTRAP_SERVER=${KAFKA_BOOTSTRAP_SERVER}
      - BACKUP_LOCATION=${BACKUP_LOCATION}
      - BACKUP_ENABLED=${BACKUP_ENABLED}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      redpanda:
        condition: service_started
    volumes:
      - ${BACKUP_PATH}:${BACKUP_LOCATION}


  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_API_STALE_UPLOADS_EXPIRY: 1h
      MINIO_API_STALE_UPLOADS_CLEANUP_INTERVAL: 1h  # check hourly
    volumes:
      - ${MINIO_VOLUME}:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc
    container_name: minio-init
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - ../.docker/minio/minio-init.sh:/minio-init.sh:ro
    entrypoint: [ "/bin/sh", "/minio-init.sh" ]

  nginx:
    build:
      context: ../.docker/nginx
      dockerfile: Dockerfile
    image: my-nginx/openresty:1.27.1.2-0-bookworm-fat
    container_name: nginx
    ports:
      - "80:80"
    depends_on:
      - minio
      - ffmpeg
    volumes:
      - ../.docker/nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ../.docker/nginx/proxy.conf:/usr/local/openresty/nginx/conf/proxy.conf:ro
      - ../.docker/nginx/streamingservice.conf:/usr/local/openresty/nginx/conf/conf.d/streamingservice.conf:ro
      - ${RAM_VOLUME}:/chunks
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ffmpeg:
    image: linuxserver/ffmpeg:arm64v8-version-8.0-cli
    container_name: ffmpeg
    depends_on:
      - minio
    entrypoint: [ "/bin/sh", "-c" ]   # replace ffmpeg with a shell
    command: [ "tail -f /dev/null" ]  # keep alive
    volumes:
      - ${RAM_VOLUME}:/chunks      # mount same RAM disk
      - ${THUMBNAIL_DISK}:/disk    # to generate thumbnails and then move to minio

  opensearch:
    image: opensearchproject/opensearch:3.3.2
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms${OPENSEARCH_HEAP_GB}g -Xmx${OPENSEARCH_HEAP_GB}g
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9600:9600"
    healthcheck:
      # We check if the cluster status is 'green' or 'yellow'
      test: [ "CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -qE 'green|yellow'" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s # Give it 10s to boot before even trying to check
    volumes:
      - ${OPENSEARCH_VOLUME}:/usr/share/opensearch/data

  redis:
    image: redis:7.4.7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      - redis-server
      - --requirepass ${REDIS_PASSWORD}
      - --save ""
      - --appendonly no

  postgres:
    image: postgres:18
    container_name: postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: media_db
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ${POSTGRES_VOLUME}:/var/lib/postgresql

  postgres-init:
    image: postgres:18
    container_name: postgres-init
    depends_on:
      - postgres
    restart: "no"
    entrypoint: [ "/bin/bash", "/scripts/bootstrap.sh" ]
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_SUPERUSER: ${DB_USERNAME}
      DB_SUPERUSER_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ../.docker/postgres/initdb.d:/scripts

  redpanda:
    image: redpandadata/redpanda:v25.2.12
    container_name: redpanda_kafka
    ports:
      - "9092:9092"       # Kafka API
      - "9644:9644"       # Admin API
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
#      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
#      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
      - --kafka-addr=INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      - --advertise-kafka-addr=INTERNAL://redpanda:29092,EXTERNAL://localhost:9092
    volumes:
      - ${REDPANDA_VOLUME}:/var/lib/redpanda/data

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE}
      MONGODB_USERNAME: ${MONGODB_USERNAME}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD}
      MONGODB_AUTH_SOURCE: ${MONGODB_AUTH_SOURCE}
    # Starts mongo with replica set mode enabled
    command: [ "--replSet", "rs0", "--bind_ip_all", "--keyFile", "/data/configdb/mongo-keyfile" ]
    healthcheck:
      test: mongosh --username "$MONGODB_USERNAME" --password "$MONGODB_PASSWORD" --authenticationDatabase "$MONGODB_AUTH_SOURCE" --eval "db.adminCommand('ping')"
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - ${MONGODB_VOLUME}:/data/db
      - ../.docker/mongo/mongo-keyfile:/data/configdb/mongo-keyfile

  mongo-init:
    image: mongo:7
    container_name: mongo-init
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGODB_HOST=${MONGODB_HOST}
      - MONGODB_USERNAME=${MONGODB_USERNAME}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
    entrypoint: [ "/bin/bash", "/scripts/init.sh" ]
    volumes:
      - ../.docker/mongo/init:/scripts




