spring.application.name=file-manager

server.port=${FILE_MANAGER_PORT}
media.backup.path=${BACKUP_PATH}

kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVER:localhost:9092}

spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.database=media_catalog
spring.data.mongodb.username=admin
spring.data.mongodb.password=strongpassword
spring.data.mongodb.authentication-database=admin