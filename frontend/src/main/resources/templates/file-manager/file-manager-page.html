<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8" />
    <title>File Explorer Layout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .grid-view {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(60px, 120px));
            gap: 0.5rem;
        }

        .grid-view .file-node-wrapper {
            background-color: #1f2937; /* bg-gray-800 */
            border-radius: 0.5rem; /* rounded */
            cursor: pointer;
            padding: 0.25rem;
        }

        .grid-view .file-node-wrapper:hover {
            background-color: #374151; /* hover:bg-gray-700 */
        }

        .grid-view .file-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 8rem; /* h-32 in Tailwind ~ 8rem */
        }

        .grid-view .file-node .icon {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 5.5rem; /* h-20 ~ 5rem */
        }

        .grid-view .file-node .icon .directory-icon {
            width: 5rem;
            height: 5rem;
        }

        .grid-view .file-node .icon .photo-icon {
            width: 4rem;
            height: 4rem;
        }

        .grid-view .file-node .icon .video-icon {
            width: 5rem;
            height: 5rem;
        }

        .grid-view .file-node .icon .album-icon {
            width: 4rem;
            height: 4rem;
        }

        .grid-view .file-node .icon .file-icon {
            width: 4rem;
            height: 4rem;
        }

        .grid-view .file-node img {
            width: 100%;
            height: 100% !important;
            object-fit: scale-down;
        }

        .grid-view .file-node .name {
            text-align: center;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            line-height: 1rem;
            width: 100%;
            min-width: 0;
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        /* List View */
        .list-view {
            display: flex;
            flex-direction: column;
            gap: 0.25rem; /* gap-2 */
            align-items: center;
        }

        .list-view .file-node-wrapper {
            padding: 0;
        }

        .list-view .file-node {
            display: flex;
            flex-direction: row;
            align-items: center;
            height: 2rem;
            padding: 0 0.75rem; /* px-3 */
            gap: 0.5rem;
            background-color: #1f2937; /* bg-gray-800 */
            border-radius: 0.5rem; /* rounded */
            cursor: pointer;
        }

        .list-view .file-node .icon {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
        }

        .list-view .file-node .icon .directory-icon {
            width: 2rem;
            height: 2rem;
        }

        .list-view .file-node .icon .photo-icon {
            width: 2rem;
            height: 2rem;
        }

        .list-view .file-node .icon .video-icon {
            width: 2rem;
            height: 2rem;
        }

        .list-view .file-node .icon .album-icon {
            width: 2rem;
            height: 2rem;
        }

        .list-view .file-node .icon .file-icon {
            width: 2rem;
            height: 2rem;
        }

        .list-view .file-node img {
            width: 2rem;
            height: 100%; !important;
            object-fit: scale-down;
        }

        .list-view .file-node .name {
            text-align: left;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
        }

        .no-scrollbar::-webkit-scrollbar {
            display: none; /* Safari and Chrome */
        }

        .no-scrollbar {
            -ms-overflow-style: none;  /* Internet Explorer and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
</head>

<body class="h-screen bg-gray-900 text-gray-100 flex flex-col overflow-hidden">

<!-- Top Bar -->
<div class="flex items-center w-full px-2 py-2 border-b border-gray-700">

    <button id="path-back-btn" class="flex items-center gap-2 px-3 py-1.5 mr-2 rounded-lg border border-gray-700 bg-gray-900 text-sm text-gray-300 hover:bg-gray-800 hover:text-white transition-all">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>
        </svg>
    </button>

    <div id="path-bar" class="flex items-center w-full gap-1 text-sm text-gray-300 overflow-x-auto whitespace-nowrap no-scrollbar mr-2">
        <span class="path-node hover:underline cursor-pointer !hidden">root</span>
    </div>

    <!-- View Toggles -->
    <div class="flex gap-2 justify-end">
        <!-- Grid View Icon -->
        <button id="grid-view-btn" class="hidden p-2 rounded bg-gray-800 hover:bg-gray-600">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M3.75 3.75h6v6h-6v-6zm10.5 0h6v6h-6v-6zm-10.5 10.5h6v6h-6v-6zm10.5 0h6v6h-6v-6z" />
            </svg>
        </button>

        <!-- List View Icon -->
        <button id="list-view-btn" class="p-2 rounded bg-gray-800 hover:bg-gray-700">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round"
                      d="M4 6h6M4 12h6M4 18h6M14 12h6M14 12v6M14 12V6" />
            </svg>
        </button>
    </div>
</div>

<div class="px-4 py-2 w-fit text-sm text-gray-300 border-b border-gray-700">
    In: <span id="current-path">root</span>
</div>

<!-- Main Content -->
<div class="flex-1 flex flex-col md:flex-row overflow-hidden relative">

    <!-- File Explorer -->
    <div id="file-zone" class="flex-1 p-4 overflow-auto">
        <label for="file-input"
                class="inline-flex items-center gap-2 cursor-pointer rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 focus-within:ring-2 focus-within:ring-blue-400 focus-within:ring-offset-2">
            📁 Upload files
        </label>
        <input id="file-input" type="file" multiple class="sr-only" />
        <label for="folder-input"
               class="inline-flex items-center gap-2 cursor-pointer rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700 focus-within:ring-2 focus-within:ring-blue-400 focus-within:ring-offset-2">
            📁 Upload folder
        </label>
        <input id="folder-input" type="file" multiple webkitdirectory class="sr-only" />

        <label class="flex items-center gap-2 mt-2 text-gray-300 text-sm cursor-pointer">
            <input type="checkbox"
                   name="upload_type"
                   value="video"
                   id="upload-video-checkbox"
                   class="w-4 h-4 border-gray-600 bg-gray-800 text-indigo-500 focus:ring-indigo-500 focus:ring-offset-gray-900" />
            <span>Upload as Video(s)</span>
        </label>

        <div class="flex gap-2 mt-2 items-center">
            <label for="sort-file-upload-select">Sort Upload:</label>
            <select id="sort-file-upload-select" class="block w-56 rounded-md border border-gray-300 bg-white px-3 py-2 text-sm text-gray-700 shadow-sm focus:border-blue-500 focus:outline-none focus:ring-1 focus:ring-blue-500">
                <optgroup label="Name">
                    <option value="name-asc" selected>Name (A → Z)</option>
                    <option value="name-desc">Name (Z → A)</option>
                </optgroup>

                <optgroup label="Last modified">
                    <option value="modified-asc">Last modified (Oldest)</option>
                    <option value="modified-desc">Last modified (Newest)</option>
                </optgroup>
            </select>
        </div>

        <div class="mt-4 max-h-24 w-full overflow-y-auto rounded-lg border border-gray-200 bg-white">
            <ul id="upload-list" class="w-full divide-y divide-gray-200 text-sm">
                <li class="px-3 truncate text-gray-800 !hidden">File Name</li>
            </ul>
        </div>

        <!-- Upload Progress Bar -->
        <div id="upload-progress" class="hidden w-full max-w-md rounded-lg bg-slate-900 p-4 shadow-md">
            <div class="mb-2 flex items-center justify-between text-sm text-slate-300">
                <span>Upload Progress:</span>
                <span id="progress-percent">0%</span>
            </div>
            <div class="h-2 w-full overflow-hidden rounded-full bg-slate-700">
                <div id="progress-bar-fill"
                     class="h-full w-0 rounded-full
                bg-linear-to-r from-blue-500 to-blue-400
                transition-[width] duration-150 ease-out">
                </div>
            </div>
        </div>

        <!-- Error Message -->
        <div id="error-message-container"
             class="hidden flex flex-col bg-red-900 border border-red-700 text-red-300 p-3 rounded-lg">
            <span>Error something</span>
        </div>

        <!-- Submit Button -->
        <button id="submit-btn"
                type="submit"
                class="w-full mt-2 bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 rounded-lg shadow">
            Submit
        </button>

        <div id="file-view-container" class="grid-view grid text-xs">
            <div class="file-node-wrapper !hidden">
                <div class="file-node">
                    <div class="icon flex items-center justify-center">
                    </div>
                    <div class="name" title="">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="icon-container" class="hidden">
        <svg class="directory-icon text-yellow-400" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M3 7.5A2.25 2.25 0 015.25 5.25h4.38a2.25 2.25 0 011.59.66l1.22 1.22a2.25 2.25 0 001.59.66h4.21A2.25 2.25 0 0121.5 10.5v6.75A2.25 2.25 0 0119.25 19.5H5.25A2.25 2.25 0 013 17.25V7.5z" />
        </svg>
        <svg class="photo-icon text-green-400" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M3 5.25A2.25 2.25 0 015.25 3h13.5A2.25 2.25 0 0121 5.25v13.5A2.25 2.25 0 0118.75 21H5.25A2.25 2.25 0 013 18.75V5.25z" />
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M3 15l4.5-4.5 4.5 4.5 3-3L21 18" />
        </svg>
        <svg class="video-icon text-purple-400" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M15.75 9.75L20.25 7.5v9l-4.5-2.25M4.5 6.75h11.25A2.25 2.25 0 0118 9v6a2.25 2.25 0 01-2.25 2.25H4.5A2.25 2.25 0 012.25 15V9A2.25 2.25 0 014.5 6.75z"/>
        </svg>
        <svg class="file-icon text-blue-400" fill="none" stroke="currentColor" stroke-width="1" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                  d="M14.25 2.25H6.75A2.25 2.25 0 004.5 4.5v15A2.25 2.25 0 006.75 21.75h10.5A2.25 2.25 0 0019.5 19.5V7.5L14.25 2.25z"/>
        </svg>
        <svg class="album-icon" viewBox="0 0 220 180" xmlns="http://www.w3.org/2000/svg">
            <rect x="20" y="20" width="140" height="100" rx="8" fill="#d1d5db"/>
            <rect x="40" y="35" width="140" height="100" rx="8" fill="#9ca3af"/>
            <rect x="60" y="50" width="140" height="100" rx="8" fill="#111827"/>
            <circle cx="90" cy="80" r="10" fill="#fbbf24"/>
            <path d="M70 130 L95 105 L115 125 L135 100 L160 130 Z" fill="#4ade80"/>
        </svg>
    </div>
</div>


<script type="module" src="/static/js/file-manager/file-manager-page.js"></script>

</body>
</html>
