services: # docker compose -f compose.mac.dev.yml --env-file .env.dev -p ss-dev up -d
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z-cpuv1
    container_name: ${PREFIX_NAME}-minio
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_API_STALE_UPLOADS_EXPIRY: 1h
      MINIO_API_STALE_UPLOADS_CLEANUP_INTERVAL: 1h  # check hourly
    volumes:
      - ${MINIO_VOLUME}:/data
    command: server /data --console-address ":9001"

  minio-init:
    image: minio/mc
    container_name: ${PREFIX_NAME}-minio-init
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - ../.docker/minio/minio-init.sh:/minio-init.sh:ro
    entrypoint: [ "/bin/sh", "/minio-init.sh" ]

  # docker compose -f compose.mac.yaml build nginx
  nginx:
    build:
      context: ../.docker/nginx
      dockerfile: Dockerfile
    image: my-nginx/openresty:1.27.1.2-0-bookworm-fat
    container_name: ${PREFIX_NAME}-nginx
    ports:
      - "80:80"
    volumes:
      - ../.docker/nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
      - ../.docker/nginx/proxy.conf:/usr/local/openresty/nginx/conf/proxy.conf:ro
      - ../.docker/nginx/streamingservice.dev.conf:/usr/local/openresty/nginx/conf/conf.d/streamingservice.dev.conf:ro
      - ${RAM_VOLUME}:/chunks
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # docker exec -it nginx nginx -V #check for config being applied or not - --config-path=

  ffmpeg:
    image: linuxserver/ffmpeg:arm64v8-version-8.0-cli
    container_name: ${PREFIX_NAME}-ffmpeg
    entrypoint: [ "/bin/sh", "-c" ]   # replace ffmpeg with a shell
    command: [ "tail -f /dev/null" ]  # keep alive
    volumes:
      - ${RAM_VOLUME}:/chunks      # mount same RAM disk
      - ${THUMBNAIL_DISK}:/disk    # to generate thumbnails and then move to minio

  opensearch:
    image: opensearchproject/opensearch:3.3.2
    container_name: ${PREFIX_NAME}-opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms${OPENSEARCH_HEAP_GB}g -Xmx${OPENSEARCH_HEAP_GB}g
      - plugins.security.disabled=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - ${OPENSEARCH_VOLUME}:/usr/share/opensearch/data

  redis:
    image: redis:7.4.7-alpine
    container_name: ${PREFIX_NAME}-redis
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      - redis-server
      - --requirepass ${REDIS_PASSWORD}
      - --save ""
      - --appendonly no

  postgres:
    image: postgres:18
    container_name: ${PREFIX_NAME}-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: media_db
    ports:
      - "5432:5432"
    volumes:
      - ${POSTGRES_VOLUME}:/var/lib/postgresql

  postgres-init:
    image: postgres:18
    container_name: ${PREFIX_NAME}-postgres-init
    depends_on:
      - postgres
    restart: "no"
    entrypoint: [ "/bin/bash", "/scripts/bootstrap.sh" ]
    environment:
      DB_HOST: postgres
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_SUPERUSER: ${DB_USERNAME}
      DB_SUPERUSER_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ../.docker/postgres/initdb.d:/scripts

  redpanda:
    image: redpandadata/redpanda:v25.2.12
    container_name: ${PREFIX_NAME}-redpanda_kafka
    ports:
      - "9092:9092"       # Kafka API
      - "9644:9644"       # Admin API
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=1G
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    volumes:
      - ${REDPANDA_VOLUME}:/var/lib/redpanda/data

  mongodb:
    build:
      context: ../.docker/mongo
      dockerfile: Dockerfile
    container_name: ${PREFIX_NAME}-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGODB_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGODB_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE}
      MONGODB_USERNAME: ${MONGODB_USERNAME}
      MONGODB_PASSWORD: ${MONGODB_PASSWORD}
      MONGODB_AUTH_SOURCE: ${MONGODB_AUTH_SOURCE}
    volumes:
      - ${MONGODB_VOLUME}:/data/db

  mongo-init:
    image: mongo:7
    container_name: ${PREFIX_NAME}-mongo-init
    depends_on:
      - mongodb
    environment:
      - MONGODB_HOST=${MONGODB_HOST}
      - MONGODB_USERNAME=${MONGODB_USERNAME}
      - MONGODB_PASSWORD=${MONGODB_PASSWORD}
    entrypoint: [ "/bin/bash", "/scripts/init.sh" ]
    volumes:
      - ../.docker/mongo/init:/scripts

